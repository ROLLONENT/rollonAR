{% extends "base.html" %}
{% block title %}ROLLON AR | Songs{% endblock %}
{% block content %}
<div class="page-layout">
  <div class="page-sidebar">
    <div class="sidebar-header">Views</div>
    <div id="views-list"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-header">Quick Filters</div>
    <div class="view-item" onclick="S.qf('tag','BW Collab')">BW Collab</div>
    <div class="view-item" onclick="S.qf('tag','EMMMA Collab')">EMMMA Collab</div>
    <div class="view-item" onclick="S.qf('tag','IM Collab')">IM Collab</div>
    <div class="view-item" onclick="S.qf('audio status','Pitch Ready')">Pitch Ready</div>
    <div class="view-item" onclick="S.qf('audio status','Released')">Released</div>
    <div class="view-item" onclick="S.qf('audio status','In Production')">In Production</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-header">Group By</div>
    <div class="view-item" onclick="S.setGroup('Project')">Project</div>
    <div class="view-item" onclick="S.setGroup('Audio Status')">Status</div>
    <div class="view-item" onclick="S.setGroup('Tag')">Tag</div>
    <div class="view-item" onclick="S.setGroup('')">No Group</div>
  </div>
  <div class="page-body">
    <div class="toolbar">
      <div style="position:relative"><input class="toolbar-search" id="search-input" placeholder="Search songs..."></div>
      <button class="btn" id="btn-filter" onclick="S.toggleFilter()">⊞ Filter</button>
      <div style="position:relative">
        <button class="btn" id="btn-fields" onclick="S.toggleFields()">⊟ Fields</button>
        <div class="fields-panel" id="fields-panel"></div>
      </div>
      <button class="btn" id="btn-sort" onclick="S.showSortPanel()">↕ Sort</button>
      <button class="btn" id="btn-group" onclick="S.showGroupPanel()">▦ Group</button>
      <button class="btn btn-accent" onclick="S.newRecord()">+ New Song</button>
      <button class="btn btn-sm" onclick="showImportDialog('songs')" title="Import CSV">📥</button>
      <button class="btn btn-sm" onclick="exportViewCSV('songs')" title="Export current view">📤</button>
      <button class="btn btn-sm" onclick="createPlaylistFromSongs()" title="Create playlist from selected songs">🎵</button>
      <button class="btn btn-sm" onclick="togglePillColors()" title="Toggle pill colors">🎨</button>
      <div class="toolbar-right"><span class="toolbar-info" id="record-count"></span></div>
    </div>
    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-count">0 selected</span>
      <span class="bulk-select-all" id="select-all-filtered" onclick="selectAllFiltered('songs')" style="display:none">Select all results</span>
      <button class="btn btn-sm" onclick="bulkAction('add_tag','songs')">+ Tag</button>
      <button class="btn btn-sm" onclick="bulkAction('remove_tag','songs')">- Tag</button>
      <button class="btn btn-sm" onclick="bulkAction('add_field','songs')">+ Add to Field</button>
      <button class="btn btn-sm" onclick="bulkAction('remove_field','songs')">- Remove from Field</button>
      <button class="btn btn-sm" onclick="bulkAction('set_field','songs')">= Set Field</button>
      <button class="btn btn-sm btn-danger" onclick="bulkAction('delete','songs')">🗑 Delete</button>
      <button class="btn btn-sm" onclick="window._selectedRows.clear();updateBulkBar();reload()">Clear</button>
    </div>
    <div class="filter-panel" id="filter-panel"></div>
    <div class="sort-panel" id="sort-panel"></div>
    <div class="filter-panel" id="group-panel"></div>
    <div class="grid-wrap" id="grid-wrap"><div style="padding:8px">
      <div class="skeleton-row"><div class="skeleton skeleton-cell" style="width:200px;height:14px"></div><div class="skeleton skeleton-cell" style="width:150px;height:14px"></div><div class="skeleton skeleton-cell" style="width:100px;height:14px"></div><div class="skeleton skeleton-cell" style="width:120px;height:14px"></div></div>
      <div class="skeleton-row"><div class="skeleton skeleton-cell" style="width:180px;height:14px"></div><div class="skeleton skeleton-cell" style="width:130px;height:14px"></div><div class="skeleton skeleton-cell" style="width:90px;height:14px"></div><div class="skeleton skeleton-cell" style="width:140px;height:14px"></div></div>
      <div class="skeleton-row"><div class="skeleton skeleton-cell" style="width:220px;height:14px"></div><div class="skeleton skeleton-cell" style="width:160px;height:14px"></div><div class="skeleton skeleton-cell" style="width:110px;height:14px"></div><div class="skeleton skeleton-cell" style="width:100px;height:14px"></div></div>
      <div class="skeleton-row"><div class="skeleton skeleton-cell" style="width:190px;height:14px"></div><div class="skeleton skeleton-cell" style="width:140px;height:14px"></div><div class="skeleton skeleton-cell" style="width:80px;height:14px"></div><div class="skeleton skeleton-cell" style="width:130px;height:14px"></div></div>
    </div></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const S={page:1,perPage:999,search:new URLSearchParams(location.search).get('search')||'',
  sortField:'',sortDir:'asc',filters:[],allCols:[],visibleCols:[],headers:[],
  currentView:'All',views:{},group:'',groupDir:'asc',

  init(){
    document.getElementById('search-input').value=this.search;
    setupSearchAutosuggest('search-input','songs');
    try{this.views=JSON.parse(localStorage.getItem('rollon_song_views')||'{}')}catch(e){}
    this.currentView=localStorage.getItem('rollon_song_current_view')||'All';
    if(!this.views['All'])this.views['All']={filters:[],visibleCols:[],sort:'',dir:'asc'};
    // Load saved view state
    const saved=this.views[this.currentView];
    if(saved&&saved.visibleCols?.length)this.visibleCols=[...saved.visibleCols];
    if(saved&&saved.sort)this.sortField=saved.sort;
    if(saved&&saved.dir)this.sortDir=saved.dir;
    if(saved&&saved.filters?.length)this.filters=[...saved.filters];
    this.renderViews();
    fetch('/api/songs/tags').then(r=>r.json()).then(d=>{
      this.allCols=d.columns||[];
      if(!this.visibleCols.length){
        const df=['Title','Tag','Audio Status','Artist','Producer','Songwriter Credits','Release Date','Project','Song Admin','DISCO','Dropbox Link'];
        this.visibleCols=df.filter(c=>this.allCols.includes(c));
        if(!this.visibleCols.length)this.visibleCols=this.allCols.slice(0,12);
      }
    });
    this.load();
    let deb;document.getElementById('search-input').addEventListener('input',e=>{
      clearTimeout(deb);deb=setTimeout(()=>{this.search=e.target.value;this.page=1;this.load()},300)});
  },

  _autoSave(){
    if(!this.visibleCols.length)return;
    this.views[this.currentView]={
      filters:[...this.filters],
      visibleCols:[...this.visibleCols],
      sort:this.sortField,
      dir:this.sortDir,
      group:this.group||'',
      groupDir:this.groupDir||'asc'
    };
    localStorage.setItem('rollon_song_views',JSON.stringify(this.views));
    localStorage.setItem('rollon_song_current_view',this.currentView);
  },

  load(){
    let url=`/api/songs?page=${this.page}&per_page=${this.perPage}`;
    if(this.search)url+=`&search=${encodeURIComponent(this.search)}`;
    if(this.sortField)url+=`&sort=${encodeURIComponent(this.sortField)}&dir=${this.sortDir}`;
    if(this.group)url+=`&group=${encodeURIComponent(this.group)}`;
    if(window._filterMode==='or')url+=`&filter_mode=or`;
    this.filters.forEach((f,i)=>{if(f.col)url+=`&f${i}_col=${encodeURIComponent(f.col)}&f${i}_op=${f.op}&f${i}_val=${encodeURIComponent(f.val||'')}`});
    fetch(url).then(r=>r.json()).then(d=>{
      if(d.error){toast(d.error,'error');return}
      this.headers=d.headers;window._currentHeaders=d.headers;
      document.getElementById('record-count').textContent=`${d.total} songs`;
      if(!this.visibleCols.length){
        const ac=d.headers.map(h=>cleanH(h)).filter(c=>c.toLowerCase()!=='airtable id'&&c.toLowerCase()!=='system id');
        this.visibleCols=ac.slice(0,10);this.allCols=ac;
      }
      if(this.group&&d.records.length>0){
        buildGroupedGrid('grid-wrap',d.headers,d.records,'songs',this.visibleCols,this.group,this.sortField,this.sortDir,(field)=>{
          if(this.sortField===field)this.sortDir=this.sortDir==='asc'?'desc':'asc';
          else{this.sortField=field;this.sortDir='asc'}this.load()},this.groupDir);
      } else {
        buildGridV2('grid-wrap',d.headers,d.records,'songs',this.visibleCols,this.sortField,this.sortDir,(field)=>{
          if(this.sortField===field)this.sortDir=this.sortDir==='asc'?'desc':'asc';
          else{this.sortField=field;this.sortDir='asc'}this.load()},window._selectedRows);
      }
      buildPagination('pagination',d.page,d.total_pages,d.total,(p)=>{this.page=p;this.load()});
      this._autoSave();
      this._updateToolbar();
    }).catch(()=>{document.getElementById('grid-wrap').innerHTML='<div class="loading" style="color:var(--danger)">Failed to load.</div>'});
  },

  _updateToolbar(){
    const bf=document.getElementById('btn-filter');
    const bs=document.getElementById('btn-sort');
    const bg=document.getElementById('btn-group');
    const activeFilters=this.filters.filter(f=>f.col).length;
    if(bf){
      if(activeFilters){bf.classList.add('btn-active');bf.innerHTML='⊞ Filter <span class="tb-badge">'+activeFilters+'</span>'}
      else{bf.classList.remove('btn-active');bf.innerHTML='⊞ Filter'}
    }
    if(bs){
      if(this.sortField){bs.classList.add('btn-active');bs.innerHTML='↕ '+cleanH(this.sortField)+' '+(this.sortDir==='desc'?'↓':'↑')}
      else{bs.classList.remove('btn-active');bs.innerHTML='↕ Sort'}
    }
    if(bg){
      if(this.group){bg.classList.add('btn-active');bg.innerHTML='▦ '+this.group}
      else{bg.classList.remove('btn-active');bg.innerHTML='▦ Group'}
    }
  },

  toggleFilter(){const p=document.getElementById('filter-panel');p.classList.toggle('open');
    if(p.classList.contains('open')){if(!this.filters.length)this.filters.push({col:'',op:'contains',val:''});
    const rf=()=>buildFilterPanelV2('filter-panel',this.allCols,this.headers,this.filters,(f)=>{this.filters=f;this.page=1;this.load();rf()});rf()}},

  toggleFields(){const p=document.getElementById('fields-panel');p.classList.toggle('open');
    if(p.classList.contains('open'))buildFieldsPanel('fields-panel',this.allCols,this.visibleCols,(vc)=>{this.visibleCols=vc;this.load()})},

  showSortPanel(){
    const p=document.getElementById('sort-panel');p.classList.toggle('open');
    if(p.classList.contains('open')){
      if(!this._sorts)this._sorts=[{col:'',dir:'asc'}];
      buildSortPanelV2('sort-panel',this.allCols,this.headers,this._sorts,(sorts)=>{
        this._sorts=sorts;const s=sorts.find(s=>s.col);
        if(s){this.sortField=s.col;this.sortDir=s.dir}else{this.sortField='';this.sortDir='asc'}
        this.page=1;this.load()});
    }},

  showGroupPanel(){
    const p=document.getElementById('group-panel');
    if(!p){
      // Create group panel if it doesn't exist
      const fp=document.getElementById('filter-panel');
      const gp=document.createElement('div');gp.className='filter-panel';gp.id='group-panel';
      fp.parentNode.insertBefore(gp,fp.nextSibling);
    }
    const panel=document.getElementById('group-panel');
    panel.classList.toggle('open');
    if(panel.classList.contains('open')){
      this._renderGroupPanel();
    }
  },

  _renderGroupPanel(){
    const panel=document.getElementById('group-panel');if(!panel)return;
    const current=this.group||'';
    const dir=this.groupDir||'asc';
    let html=`<div class="filter-header" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--text-secondary);font-weight:600">Group by</span><span class="filter-remove" onclick="document.getElementById('group-panel').classList.remove('open')" style="cursor:pointer;font-size:16px">✕</span></div>`;
    html+=`<div class="filter-row">`;
    html+=`<div style="position:relative;flex:1"><input class="filter-field-search" id="group-field-input" value="${esc(current)}" placeholder="Search field..." onclick="togglePfDD('group')" oninput="filterGroupDD()">`;
    html+=`<div class="filter-field-dd" id="pfdd-group" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:250px;overflow-y:auto;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:var(--r-md);z-index:50">`;
    html+=`<div class="typeahead-item" data-val="" onclick="S.setGroup('')" style="color:var(--text-ghost)">(No grouping)</div>`;
    this.allCols.forEach(c=>{html+=`<div class="typeahead-item" data-val="${escA(c)}" onclick="S.setGroup('${escA(c)}')">${esc(c)}</div>`});
    html+=`</div></div>`;
    html+=`<select onchange="S.groupDir=this.value;S.load()" style="flex:0 0 auto;width:100px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 8px;color:var(--text);font-size:11px">`;
    html+=`<option value="asc" ${dir==='asc'?'selected':''}>A → Z</option>`;
    html+=`<option value="desc" ${dir==='desc'?'selected':''}>Z → A</option>`;
    html+=`</select>`;
    if(current)html+=`<span class="filter-remove" onclick="S.setGroup('')" title="Remove grouping">🗑</span>`;
    html+=`</div>`;
    panel.innerHTML=html;
  },

  setGroup(field){
    this.group=field;this.page=1;
    if(!field)document.getElementById('group-panel')?.classList.remove('open');
    this.load();
    if(field)this._renderGroupPanel();
  },

  qf(col,val){this.filters=[{col,op:val?(col.toLowerCase().includes('tag')?'contains_any':'contains'):'is_not_empty',val}];this.page=1;
    document.getElementById('filter-panel').classList.add('open');this.load();
    const rf=()=>buildFilterPanelV2('filter-panel',this.allCols,this.headers,this.filters,(f)=>{this.filters=f;this.page=1;this.load();rf()});rf()},

  groupBy(field){this.group=field;this.page=1;this.perPage=999;this.load()},

  renderViews(){const el=document.getElementById('views-list');let html='';
    Object.keys(this.views).forEach(n=>{
      const isActive=n===this.currentView?'active':'';
      html+=`<div class="view-item ${isActive}" onclick="S.loadView('${escA(n)}')">${esc(n)}<span class="view-menu-btn" onclick="event.stopPropagation();S.showViewMenu(event,'${escA(n)}')">▾</span></div>`});
    html+='<div class="view-item" style="color:var(--accent)" onclick="S.saveView()">+ Save view</div>';el.innerHTML=html},

  showViewMenu(e,name){
    document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    const menu=document.createElement('div');menu.className='view-context-menu col-menu';
    const isDefault=name==='All';
    menu.innerHTML=`
      <div class="col-menu-item" onclick="S.renameView('${escA(name)}')"><span class="cm-icon">✏</span> Rename view</div>
      <div class="col-menu-item" onclick="S.duplicateView('${escA(name)}')"><span class="cm-icon">⊕</span> Duplicate view</div>
      <div class="col-menu-item" onclick="exportViewCSV('songs')"><span class="cm-icon">📤</span> Download CSV</div>
      ${isDefault?'':`<div class="col-menu-sep"></div><div class="col-menu-item col-menu-danger" onclick="S.deleteView('${escA(name)}')"><span class="cm-icon">🗑</span> Delete view</div>`}`;
    const rect=e.target.getBoundingClientRect();
    menu.style.left=rect.left+'px';menu.style.top=(rect.bottom+2)+'px';
    document.body.appendChild(menu);
    setTimeout(()=>{const h=e2=>{if(!menu.contains(e2.target)){menu.remove();document.removeEventListener('click',h)}};document.addEventListener('click',h)},10)},

  renameView(oldName){
    document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    showPromptModal('Rename View',[{label:'New name',placeholder:oldName,value:oldName}],(v)=>{
      if(!v[0]||v[0]===oldName)return;
      this.views[v[0]]=this.views[oldName];delete this.views[oldName];
      if(this.currentView===oldName)this.currentView=v[0];
      localStorage.setItem('rollon_song_views',JSON.stringify(this.views));this.renderViews();toast('Renamed: '+v[0])})},

  duplicateView(name){
    document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    const newName=name+' copy';
    this.views[newName]=JSON.parse(JSON.stringify(this.views[name]));
    localStorage.setItem('rollon_song_views',JSON.stringify(this.views));this.renderViews();toast('Duplicated: '+newName)},

  deleteView(name){
    document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    if(name==='All'){toast('Cannot delete default view','error');return}
    delete this.views[name];
    if(this.currentView===name){this.currentView='All';this.loadView('All')}
    localStorage.setItem('rollon_song_views',JSON.stringify(this.views));this.renderViews();toast('Deleted: '+name)},

  loadView(n){const v=this.views[n];if(!v)return;this.currentView=n;
    localStorage.setItem('rollon_song_current_view',n);
    this.filters=v.filters||[];
    if(v.visibleCols?.length)this.visibleCols=[...v.visibleCols];
    this.sortField=v.sort||'';this.sortDir=v.dir||'asc';
    this.group=v.group||'';this.groupDir=v.groupDir||'asc';
    this.page=1;this.renderViews();
    // Show filter panel if view has active filters
    const fp=document.getElementById('filter-panel');
    if(fp){if(this.filters.length&&this.filters.some(f=>f.col))fp.classList.add('open');else fp.classList.remove('open')}
    this.load()},

  saveView(){showPromptModal('Save View',[{label:'View name',placeholder:'My view'}],(v)=>{
    if(!v[0])return;const n=v[0];
    this.views[n]={filters:[...this.filters],visibleCols:[...this.visibleCols],sort:this.sortField,dir:this.sortDir};
    this.currentView=n;localStorage.setItem('rollon_song_views',JSON.stringify(this.views));this.renderViews();toast('View saved: '+n)})},

  newRecord(){showPromptModal('New Song',[
    {label:'Title (required)',placeholder:'Song title'},
    {label:'Artist',placeholder:'Performing artist'},
    {label:'Producer',placeholder:'Producer name(s)'},
    {label:'Audio Status',placeholder:'Demo',type:'select',options:['Demo','Production','Mixed','Mastered','Pitch Ready']},
  ],(v)=>{
    if(!v[0]||!v[0].trim()){toast('Title is required','error');return}
    const data={Title:v[0].trim()};
    if(v[1])data['Artist']=v[1].trim();
    if(v[2])data['Producer']=v[2].trim();
    if(v[3])data['Audio Status']=v[3];
    fetch('/api/songs/new',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)}).then(r=>r.json()).then(d=>{
        if(d.success){toast('Created: '+v[0]+(d.id?' ('+d.id+')':''));this.load()}
        else toast(d.error||'Failed','error')
      }).catch(()=>toast('Network error','error'))})}
};

window.openRecord=function(ri,table){
  pushNav(ri,table||'songs');
  // Use cached data for instant open, then refresh from API
  const cached=cacheGet(ri);
  if(cached){renderDetailModal(cached,S.headers,'songs');
    fetch(`/api/songs/${ri}`).then(r=>r.json()).then(rec=>{renderDetailModal(rec,S.headers,'songs')}).catch(()=>{})}
  else fetch(`/api/songs/${ri}`).then(r=>r.json()).then(rec=>{renderDetailModal(rec,S.headers,'songs')}).catch(()=>toast('Failed to open','error'))};
window.reload=function(){S.load()};
function createPlaylistFromSongs(){
  const sel=window._selectedRows||new Set();
  if(!sel.size){toast('Select songs with checkboxes first, or all current view songs will be used');
    // Use all visible songs
    const allIds=[];document.querySelectorAll('tr[data-ri]').forEach(tr=>{const ri=parseInt(tr.dataset.ri);if(ri)allIds.push(ri)});
    if(!allIds.length){toast('No songs to add','error');return}
    sessionStorage.setItem('playlist_songs',JSON.stringify(allIds));
  } else {
    sessionStorage.setItem('playlist_songs',JSON.stringify([...sel]));
  }
  // Show create dialog right here
  showPromptModal('Create Playlist',[
    {label:'Playlist Name',placeholder:'e.g. EMMMA Singles 2026'},
    {label:'Description (optional)',placeholder:'Songs for review...'}
  ],(v)=>{
    if(!v[0])return;
    const songIds=JSON.parse(sessionStorage.getItem('playlist_songs')||'[]');
    fetch('/api/playlists/create',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:v[0],description:v[1]||'',song_ids:songIds})
    }).then(r=>r.json()).then(d=>{
      if(d.success){
        toast('Playlist created: '+d.songs+' songs');
        sessionStorage.removeItem('playlist_songs');
        const url=location.origin+'/p/'+d.id;
        navigator.clipboard.writeText(url).then(()=>toast('Share link copied!')).catch(()=>{});
        setTimeout(()=>{window.open('/p/'+d.id,'_blank')},500);
      } else toast(d.error||'Failed','error');
    });
  });
}

function filterGroupDD(){
  const inp=document.getElementById('group-field-input');
  const dd=document.getElementById('pfdd-group');if(!inp||!dd)return;
  const q=inp.value.toLowerCase();
  dd.querySelectorAll('.typeahead-item').forEach(el=>{el.style.display=(el.dataset.val||'').toLowerCase().includes(q)?'':'none'});
  dd.style.display='block';
}
S.init();
// Auto-open record if navigated from calendar
try{const or=JSON.parse(sessionStorage.getItem('open_record')||'null');
  if(or&&or.ri){sessionStorage.removeItem('open_record');
    setTimeout(()=>{fetch(`/api/songs/${or.ri}`).then(r=>r.json()).then(rec=>{
      if(S.headers.length)renderDetailModal(rec,S.headers,'songs');
      else setTimeout(()=>renderDetailModal(rec,S.headers,'songs'),500);
    })},800)}}catch(e){}
</script>
{% endblock %}
