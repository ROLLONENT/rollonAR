{% extends "base.html" %}
{% block title %}ROLLON AR | Pitch Builder{% endblock %}
{% block content %}
<div class="page-layout">
  <div class="page-sidebar" id="pitch-sidebar">
    <div class="sidebar-header">Views</div>
    <div id="pitch-views"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-header">Quick Pitch</div>
    <div class="view-item" onclick="P.loadType('Dance')">Dance</div>
    <div class="view-item" onclick="P.loadType('Pop')">Pop</div>
    <div class="view-item" onclick="P.loadType('KPOP')">KPOP</div>
    <div class="view-item" onclick="P.loadType('Singer-Songwriter')">SSW</div>
    <div class="view-item" onclick="P.loadType('Sync')">Sync</div>
    <div class="view-item" onclick="P.loadType('Writing Trip')">Writing Trip</div>
  </div>
  <div class="page-body">
    <div class="toolbar" style="margin-bottom:8px">
      <button class="btn" id="btn-filter" onclick="P.toggleFilter()">&#8862; Filter</button>
      <button class="btn" id="btn-fields" onclick="P.toggleFields()">&#8863; Fields</button>
      <button class="btn" id="btn-sort" onclick="P.showSortPanel()">&#8597; Sort</button>
      <button class="btn" id="btn-group" onclick="P.showGroupPanel()">&#9638; Group</button>
      <button class="btn" onclick="exportViewCSV('directory')">&#128228; Export</button>
      <div class="toolbar-right">
        <input type="text" id="search-input" class="search-input" placeholder="Search contacts..." style="width:180px">
        <span class="toolbar-info" id="record-count"></span>
      </div>
    </div>
    <div class="filter-panel" id="filter-panel"></div>
    <div class="sort-panel" id="sort-panel"></div>
    <div class="filter-panel" id="group-panel"></div>
    <div class="grid-wrap" id="grid-wrap"><div style="padding:8px"><div class="skeleton-row"><div class="skeleton skeleton-cell" style="width:200px;height:14px"></div><div class="skeleton skeleton-cell" style="width:150px;height:14px"></div></div></div></div>
    <div id="pagination"></div>
    <div class="pitch-config" style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
      <h3 style="font-size:14px;margin-bottom:8px;color:var(--accent)">Campaign Settings</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><label style="font-size:11px;color:var(--text-muted);display:block">DISCO / Playlist Link</label><input id="p-link" class="form-input" placeholder="https://disco.ac/..."></div>
        <div><label style="font-size:11px;color:var(--text-muted);display:block">Round</label><input id="p-round" class="form-input" value="001"></div>
        <div><label style="font-size:11px;color:var(--text-muted);display:block">Send Date/Time</label><input type="datetime-local" id="p-date" class="form-input"></div>
      </div>
      <div style="margin-top:8px"><textarea id="p-bespoke" class="form-input" rows="3" placeholder="Bespoke paragraph (optional)..." style="resize:vertical"></textarea></div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="btn btn-accent" onclick="P.generate()">Generate Mail Merge</button>
        <button class="btn" onclick="P.draftEmail()">Preview Email</button>
        <button class="btn" onclick="showTemplateLibrary((tpl)=>{document.getElementById('p-bespoke').value=tpl.body;toast('Template loaded')})">Templates</button>
      </div>
      <div id="p-result" style="margin-top:8px"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const today=new Date();const dtt=(2-today.getDay()+7)%7||7;
const nt=new Date(today);nt.setDate(today.getDate()+dtt);nt.setHours(11,6,0,0);
const _pdp=n=>String(n).padStart(2,'0');
document.getElementById('p-date').value=`${nt.getFullYear()}-${_pdp(nt.getMonth()+1)}-${_pdp(nt.getDate())}T${_pdp(nt.getHours())}:${_pdp(nt.getMinutes())}`;

const P={page:1,perPage:999,search:'',sortField:'',sortDir:'asc',filters:[],allCols:[],visibleCols:[],
  headers:[],currentView:'All',views:{},group:'',groupDir:'asc',lastRecords:[],

  init(){
    this.views=ViewSync.load('pitch','rollon_pitch_views')
    this.currentView=localStorage.getItem('rollon_pitch_current_view')||'All';
    if(!this.views['All'])this.views['All']={filters:[],visibleCols:[],sort:'',dir:'asc'};
    const saved=this.views[this.currentView];
    if(saved&&saved.visibleCols&&saved.visibleCols.length)this.visibleCols=[...saved.visibleCols];
    if(saved&&saved.sort)this.sortField=saved.sort;
    if(saved&&saved.dir)this.sortDir=saved.dir;
    if(saved&&saved.filters&&saved.filters.length)this.filters=[...saved.filters];
    this.renderViews();
    fetch('/api/directory/tags').then(r=>r.json()).then(d=>{
      this.allCols=d.columns||[];
      if(!this.visibleCols.length){
        const df=['Name','Field','Tags','Genre','City','Email','Record Label','Last Outreach','Outreach Notes'];
        this.visibleCols=df.filter(c=>this.allCols.includes(c));
        if(!this.visibleCols.length)this.visibleCols=this.allCols.slice(0,10);
      }
    });
    this.load();
    let deb;document.getElementById('search-input').addEventListener('input',e=>{
      clearTimeout(deb);deb=setTimeout(()=>{this.search=e.target.value;this.page=1;this.load()},300)});
  },

  _autoSave(){
    if(!this.visibleCols.length)return;
    this.views[this.currentView]={filters:[...this.filters],visibleCols:[...this.visibleCols],sort:this.sortField,dir:this.sortDir,group:this.group||'',groupDir:this.groupDir||'asc'};
    ViewSync.save('pitch','rollon_pitch_views',this.views);
    localStorage.setItem('rollon_pitch_current_view',this.currentView);
  },

  load(){
    let url='/api/directory?page='+this.page+'&per_page='+this.perPage;
    if(this.search)url+='&search='+encodeURIComponent(this.search);
    if(this.sortField)url+='&sort='+encodeURIComponent(this.sortField)+'&dir='+this.sortDir;
    if(this.group)url+='&group='+encodeURIComponent(this.group);
    if(window._filterMode==='or')url+='&filter_mode=or';
    this.filters.forEach((f,i)=>{if(f.col)url+='&f'+i+'_col='+encodeURIComponent(f.col)+'&f'+i+'_op='+f.op+'&f'+i+'_val='+encodeURIComponent(f.val||'')});
    fetch(url).then(r=>r.json()).then(d=>{
      if(d.error){toast(d.error,'error');return}
      this.headers=d.headers;this.lastRecords=d.records;window._currentHeaders=d.headers;window._currentTable='directory';
      document.getElementById('record-count').textContent=d.total+' contacts';
      if(!this.visibleCols.length){
        const ac=d.headers.map(h=>cleanH(h)).filter(c=>c.toLowerCase()!=='airtable id'&&c.toLowerCase()!=='system id');
        this.visibleCols=ac.slice(0,10);this.allCols=ac;
      }
      if(this.group&&d.records.length>0){
        buildGroupedGrid('grid-wrap',d.headers,d.records,'directory',this.visibleCols,this.group,this.sortField,this.sortDir,(field)=>{
          if(this.sortField===field)this.sortDir=this.sortDir==='asc'?'desc':'asc';
          else{this.sortField=field;this.sortDir='asc'}this.load()},this.groupDir);
      } else {
        buildGridV2('grid-wrap',d.headers,d.records,'directory',this.visibleCols,this.sortField,this.sortDir,(field)=>{
          if(this.sortField===field)this.sortDir=this.sortDir==='asc'?'desc':'asc';
          else{this.sortField=field;this.sortDir='asc'}this.load()},window._selectedRows);
      }
      buildPagination('pagination',d.page,d.total_pages,d.total,(p)=>{this.page=p;this.load()});
      this._autoSave();this._updateToolbar();
    });
  },

  _updateToolbar(){
    const bf=document.getElementById('btn-filter');const bs=document.getElementById('btn-sort');const bg=document.getElementById('btn-group');
    const n=this.filters.filter(f=>f.col).length;
    if(bf){if(n){bf.classList.add('btn-active');bf.innerHTML='&#8862; Filter <span class="tb-badge">'+n+'</span>'}else{bf.classList.remove('btn-active');bf.innerHTML='&#8862; Filter'}}
    if(bs){if(this.sortField){bs.classList.add('btn-active');bs.innerHTML='&#8597; '+cleanH(this.sortField)+' '+(this.sortDir==='desc'?'&#8595;':'&#8593;')}else{bs.classList.remove('btn-active');bs.innerHTML='&#8597; Sort'}}
    if(bg){if(this.group){bg.classList.add('btn-active');bg.innerHTML='&#9638; '+this.group}else{bg.classList.remove('btn-active');bg.innerHTML='&#9638; Group'}}
  },

  toggleFilter(){const p=document.getElementById('filter-panel');p.classList.toggle('open');
    if(p.classList.contains('open')){if(!this.filters.length)this.filters.push({col:'',op:'contains',val:''});
    const rf=()=>buildFilterPanelV2('filter-panel',this.allCols,this.headers,this.filters,(f)=>{this.filters=f;this.page=1;this.load();rf()});rf()}},

  toggleFields(){const p=document.getElementById('fields-panel')||document.createElement('div');
    if(!document.getElementById('fields-panel')){p.className='fields-panel';p.id='fields-panel';document.querySelector('.toolbar').parentNode.insertBefore(p,document.getElementById('filter-panel'))}
    p.classList.toggle('open');
    if(p.classList.contains('open'))buildFieldsPanel('fields-panel',this.allCols,this.visibleCols,(vc)=>{this.visibleCols=vc;this.load()})},

  showSortPanel(){const p=document.getElementById('sort-panel');p.classList.toggle('open');
    if(p.classList.contains('open')){if(!this._sorts)this._sorts=[{col:'',dir:'asc'}];
    buildSortPanelV2('sort-panel',this.allCols,this.headers,this._sorts,(sorts)=>{
      this._sorts=sorts;const s=sorts.find(s=>s.col);
      if(s){this.sortField=s.col;this.sortDir=s.dir}else{this.sortField='';this.sortDir='asc'}
      this.page=1;this.load()})}},

  showGroupPanel(){const panel=document.getElementById('group-panel');panel.classList.toggle('open');
    if(panel.classList.contains('open')){this._renderGroupPanel()}},

  _renderGroupPanel(){const panel=document.getElementById('group-panel');if(!panel)return;
    const current=this.group||'';
    let html='<div class="filter-header" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--text-secondary);font-weight:600">Group by</span><span class="filter-remove" onclick="document.getElementById(\'group-panel\').classList.remove(\'open\')" style="cursor:pointer;font-size:16px">&#10005;</span></div>';
    html+='<div class="filter-row"><div style="position:relative;flex:1"><input class="filter-field-search" id="pitch-group-field" value="'+esc(current)+'" placeholder="Search field..." onclick="togglePfDD(\'pgroup\')" oninput="filterPitchGroupDD()"><div class="filter-field-dd" id="pfdd-pgroup" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:250px;overflow-y:auto;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:var(--r-md);z-index:50">';
    html+='<div class="typeahead-item" data-val="" onclick="P.setGroup(\'\')" style="color:var(--text-ghost)">(No grouping)</div>';
    this.allCols.forEach(c=>{html+='<div class="typeahead-item" data-val="'+escA(c)+'" onclick="P.setGroup(\''+escA(c)+'\')">'+esc(c)+'</div>'});
    html+='</div></div><select onchange="P.groupDir=this.value;P.load()" style="flex:0 0 auto;width:100px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:5px 8px;color:var(--text);font-size:11px"><option value="asc" '+(this.groupDir!=='desc'?'selected':'')+'>A &#8594; Z</option><option value="desc" '+(this.groupDir==='desc'?'selected':'')+'>Z &#8594; A</option></select>';
    if(current)html+='<span class="filter-remove" onclick="P.setGroup(\'\')" title="Remove grouping">&#128465;</span>';
    html+='</div>';panel.innerHTML=html},

  setGroup(f){this.group=f;this.page=1;if(!f)document.getElementById('group-panel')?.classList.remove('open');this.load();if(f)this._renderGroupPanel()},

  loadType(type){
    this.filters=[
      {col:'Tags',op:'does_not_contain',val:'Dont Pitch'},
      {col:'Tags',op:'does_not_contain',val:'Blocked'},
      {col:'Email',op:'is_not_empty',val:''},
    ];
    if(type==='Dance')this.filters.push({col:'Tags',op:'contains_any',val:'Dance Pitch,Dance Pitches'});
    else if(type==='Pop')this.filters.push({col:'Tags',op:'contains_any',val:'Pop Pitch'});
    else if(type==='KPOP')this.filters.push({col:'Tags',op:'contains_any',val:'KPOP Pitch'});
    else if(type==='Singer-Songwriter')this.filters.push({col:'Tags',op:'contains_any',val:'SSW Pitch'});
    else if(type==='Sync')this.filters.push({col:'Field',op:'contains_any',val:'Music Supervisor,Sync'});
    else if(type==='Writing Trip')this.filters.push({col:'Tags',op:'contains_any',val:'PW Tour'});
    this.page=1;this.load();
    document.getElementById('filter-panel').classList.add('open');
    const rf=()=>buildFilterPanelV2('filter-panel',this.allCols,this.headers,this.filters,(f)=>{this.filters=f;this.page=1;this.load();rf()});
    setTimeout(rf,500);
  },

  renderViews(){const el=document.getElementById('pitch-views');let html='';
    Object.keys(this.views).forEach(n=>{
      const a=n===this.currentView?'active':'';
      html+='<div class="view-item '+a+'" onclick="P.loadView(\''+escA(n)+'\')">'+esc(n)+'<span class="view-menu-btn" onclick="event.stopPropagation();P.showViewMenu(event,\''+escA(n)+'\')">&#9662;</span></div>'});
    html+='<div class="view-item" style="color:var(--accent)" onclick="P.saveView()">+ Save view</div>';el.innerHTML=html},

  showViewMenu(e,name){
    document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    const menu=document.createElement('div');menu.className='view-context-menu col-menu';
    const isDefault=name==='All';
    menu.innerHTML='<div class="col-menu-item" onclick="P.renameView(\''+escA(name)+'\')"><span class="cm-icon">&#9998;</span> Rename</div><div class="col-menu-item" onclick="P.duplicateView(\''+escA(name)+'\')"><span class="cm-icon">&#8853;</span> Duplicate</div>'+(isDefault?'':'<div class="col-menu-sep"></div><div class="col-menu-item col-menu-danger" onclick="P.deleteView(\''+escA(name)+'\')"><span class="cm-icon">&#128465;</span> Delete</div>');
    const rect=e.target.getBoundingClientRect();menu.style.left=rect.left+'px';menu.style.top=(rect.bottom+2)+'px';
    document.body.appendChild(menu);
    setTimeout(()=>{const h=e2=>{if(!menu.contains(e2.target)){menu.remove();document.removeEventListener('click',h)}};document.addEventListener('click',h)},10)},

  renameView(old){document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    showPromptModal('Rename View',[{label:'New name',placeholder:old,value:old}],(v)=>{
      if(!v[0]||v[0]===old)return;this.views[v[0]]=this.views[old];delete this.views[old];
      if(this.currentView===old)this.currentView=v[0];this._autoSave();this.renderViews();toast('Renamed: '+v[0])})},

  duplicateView(name){document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    const nn=name+' copy';this.views[nn]=JSON.parse(JSON.stringify(this.views[name]));this._autoSave();this.renderViews();toast('Duplicated: '+nn)},

  deleteView(name){document.querySelectorAll('.view-context-menu').forEach(m=>m.remove());
    if(name==='All'){toast('Cannot delete default view','error');return}
    delete this.views[name];if(this.currentView===name){this.currentView='All';this.loadView('All')}
    this._autoSave();this.renderViews();toast('Deleted: '+name)},

  loadView(n){const v=this.views[n];if(!v)return;this.currentView=n;
    localStorage.setItem('rollon_pitch_current_view',n);
    this.filters=v.filters||[];if(v.visibleCols&&v.visibleCols.length)this.visibleCols=[...v.visibleCols];
    this.sortField=v.sort||'';this.sortDir=v.dir||'asc';this.group=v.group||'';this.groupDir=v.groupDir||'asc';
    this.page=1;this.renderViews();this.load()},

  saveView(){showPromptModal('Save Pitch View',[{label:'View name',placeholder:'e.g. EMMMA Global Pitch'}],(v)=>{
    if(!v[0])return;this.views[v[0]]={filters:[...this.filters],visibleCols:[...this.visibleCols],sort:this.sortField,dir:this.sortDir,group:this.group||'',groupDir:this.groupDir||'asc'};
    this.currentView=v[0];this._autoSave();this.renderViews();toast('View saved: '+v[0])})},

  generate(){
    const sel=this.lastRecords.filter((r,i)=>window._selectedRows?.has(r._row_index));
    const contacts=sel.length?sel:this.lastRecords;
    const nh=this.headers.find(h=>cleanH(h).toLowerCase()==='name');
    const eh=this.headers.find(h=>cleanH(h).toLowerCase()==='email');
    const ch=this.headers.find(h=>cleanH(h).toLowerCase()==='city');
    const mapped=contacts.map(r=>({name:r[nh]||'',email:r[eh]||'',city:r[ch]||''})).filter(c=>c.email);
    fetch('/api/pitch/generate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pitch_type:this.currentView||'Custom',playlist_link:document.getElementById('p-link').value,
        round_number:document.getElementById('p-round').value,bespoke_paragraph:document.getElementById('p-bespoke').value,
        contacts:mapped.map(c=>({...c,selected:true})),send_day:'Tuesday'})
    }).then(r=>r.json()).then(d=>{
      if(d.success){
        let html='<div style="padding:12px;background:var(--bg);border:1px solid var(--success);border-radius:var(--r-md)">';
        html+='<strong style="color:var(--success)">Campaign generated!</strong><br>';
        html+=d.total_contacts+' contacts<br>';
        if(d.spreadsheet_url)html+='<a href="'+d.spreadsheet_url+'" target="_blank" style="color:var(--accent)">Open Mail Merge Sheet</a>';
        html+='</div>';
        document.getElementById('p-result').innerHTML=html;
        toast('Mail merge ready: '+d.total_contacts+' contacts');
      } else toast(d.error||'Generation failed','error')})},

  draftEmail(){fetch('/api/pitch/draft-email',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pitch_type:this.currentView||'Custom',round_number:document.getElementById('p-round').value,
      playlist_link:document.getElementById('p-link').value})}).then(r=>r.json()).then(d=>{
      if(d.draft){const pre=document.createElement('pre');pre.style.cssText='background:var(--bg);padding:12px;border-radius:var(--r-md);font-size:12px;white-space:pre-wrap;max-height:300px;overflow:auto';
        pre.textContent=d.draft;document.getElementById('p-result').innerHTML='';document.getElementById('p-result').appendChild(pre)
      }})}
};

function filterPitchGroupDD(){
  const inp=document.getElementById('pitch-group-field');
  const dd=document.getElementById('pfdd-pgroup');if(!inp||!dd)return;
  const q=inp.value.toLowerCase();
  dd.querySelectorAll('.typeahead-item').forEach(el=>{el.style.display=(el.dataset.val||'').toLowerCase().includes(q)?'':'none'});dd.style.display='block';
}

window.openRecord=function(ri,table){
  pushNav(ri,table||'directory');
  fetch('/api/directory/'+ri).then(r=>r.json()).then(rec=>{
    if(window._currentHeaders&&window._currentHeaders.length>5)renderDetailModal(rec,window._currentHeaders,'directory');
    else fetch('/api/directory?per_page=1').then(r=>r.json()).then(dd=>{window._currentHeaders=dd.headers;renderDetailModal(rec,dd.headers,'directory')})})};
window.reload=function(){P.load()};
P.init();
</script>
{% endblock %}
