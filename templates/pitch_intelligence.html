{% extends "base.html" %}
{% block title %}ROLLON AR | Pitch Intelligence{% endblock %}
{% block content %}
<div class="dashboard" style="max-width:1100px;margin:0 auto;padding:20px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h1 style="margin:0;font-size:22px">Pitch Intelligence</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <label style="font-size:11px;color:var(--text-ghost)">Window (days)</label>
      <input id="pi-window" type="number" min="1" max="365" value="30" style="width:80px;padding:4px 8px;background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;color:var(--text)">
      <button class="btn btn-sm" onclick="loadPI()">Refresh</button>
    </div>
  </div>
  <div id="pi-as-of" style="font-size:11px;color:var(--text-ghost);margin-bottom:16px"></div>
  <div id="pi-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:24px"></div>
  <div id="pi-lists" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px"></div>
</div>
<script>
function metricCard(label, value, accent){
  return `<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-ghost);margin-bottom:6px">${label}</div>
    <div style="font-size:24px;font-weight:600;color:${accent||'var(--accent)'}">${value}</div>
  </div>`;
}
function listCard(title, items){
  if(!items||!items.length){
    return `<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px">
      <div style="font-size:12px;color:var(--text-ghost);margin-bottom:10px">${title}</div>
      <div style="font-size:11px;color:var(--text-ghost)">No data</div>
    </div>`;
  }
  const rows=items.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>${i.name}</span><span style="color:var(--accent);font-family:var(--font-m)">${i.count}</span></div>`).join('');
  return `<div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px">
    <div style="font-size:12px;color:var(--text-ghost);margin-bottom:10px">${title}</div>
    ${rows}
  </div>`;
}
function loadPI(){
  const windowDays=document.getElementById('pi-window').value||30;
  const grid=document.getElementById('pi-grid');
  const lists=document.getElementById('pi-lists');
  grid.innerHTML='<div style="color:var(--text-ghost);font-size:12px">Loading...</div>';
  fetch('/api/pitch-intelligence?window_days='+windowDays).then(r=>r.json()).then(d=>{
    if(d.error){grid.innerHTML='<div style="color:var(--danger)">'+d.error+'</div>';return}
    const m=d.metrics||{};
    document.getElementById('pi-as-of').textContent='Computed '+d.as_of+' · window '+d.window_days+' days';
    grid.innerHTML=[
      metricCard('Total contacts',m.total_contacts),
      metricCard('Recently pitched',m.recently_pitched,'#22c55e'),
      metricCard('Pitches in window',m.pitches_in_window,'#8b5cf6'),
      metricCard('Total pitches logged',m.total_pitches_logged),
      metricCard('Group leaders',m.group_leaders,'#d4a853'),
      metricCard("Don't Mass Pitch",m.dont_mass_pitch,'#dc2626'),
      metricCard('Coverage ratio',(m.coverage_ratio*100).toFixed(1)+'%','#0d9488'),
      metricCard('Warmth: hot',(m.warmth_breakdown||{}).hot||0,'#ef4444'),
      metricCard('Warmth: warm',(m.warmth_breakdown||{}).warm||0,'#eab308'),
      metricCard('Warmth: cold',(m.warmth_breakdown||{}).cold||0,'#6b7280'),
    ].join('');
    lists.innerHTML=listCard('Top Fields',m.top_fields)+listCard('Top Countries',m.top_countries);
  });
}
loadPI();
</script>
{% endblock %}
